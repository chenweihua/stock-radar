name: Update Stock Radar

on:
  schedule:
    # 每日 UTC 22:00 跑一次（北京时间次日 6:00）
    - cron: "0 22 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/**"
      - "feeds/follow.example.opml"
      - ".github/workflows/update-news.yml"
      - "requirements.txt"
      - "index.html"
      - "assets/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update (with optional private OPML)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "Using private OPML from secret"
            echo "$FOLLOW_OPML_B64" | base64 -d > feeds/follow.opml
            OPML_ARG="--rss-opml feeds/follow.opml"
          else
            echo "Using example OPML (public demo)"
            OPML_ARG="--rss-opml feeds/follow.example.opml"
          fi
          python scripts/update_news.py --output-dir data --window-hours 24 $OPML_ARG

      - name: Clean up private OPML
        if: always()
        run: rm -f feeds/follow.opml

      - name: Upload data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: radar-data
          path: data/
          if-no-files-found: error
          retention-days: 7

      - name: Commit & push data
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "bot@local"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): update radar $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo (full history for data/)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download radar-data artifact
        uses: actions/download-artifact@v4
        with:
          name: radar-data
          path: data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
